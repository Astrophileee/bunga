<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bunga Untuk Kamu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <section class="card" aria-label="Hadiah bunga">
      <div class="cute-orbit" aria-hidden="true">
        <span class="bubble bubble-1"></span>
        <span class="bubble bubble-2"></span>
        <span class="bubble bubble-3"></span>
        <span class="heart heart-1"></span>
        <span class="heart heart-2"></span>
        <span class="star star-1"></span>
        <span class="star star-2"></span>
      </div>

      <p class="mini-title">ada sesuatu buat kamu</p>
      <h1>Buka yaa sayang</h1>
      <p class="subtitle">Klik tombolnya, nanti bunganya muncul khusus buat pacar paling manis.</p>

      <button class="open-btn" type="button" id="openButton">
        <span class="btn-shine"></span>
        <span>Open</span>
      </button>

      <div class="flower-stage" id="flowerStage" aria-live="polite">
        <div class="flower-showcase">
          <div class="flower-frame">
            <img src="bunga.png" alt="Bunga cantik untuk kamu" class="flower-image">
          </div>


        </div>
        <p class="love-note">Bunga kecil ini buat kamu yang selalu bikin hariku lebih semangat.</p>
      </div>
    </section>

    <div class="particle-layer" id="particleLayer" aria-hidden="true"></div>
    <audio id="loveSong" src="lagu.mp3" preload="auto"></audio>
  </main>

  <script src="script.js"></script>
</body>
</html>
